name: CD-Deploy API

permissions:
  contents: read
  deployments: write

on:
  workflow_run:
    workflows: ["CI-NestJS API"]
    types:
      - completed

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest

    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      # ---------------------------------------------
      # 1. Create GitHub Deployment
      # ---------------------------------------------
      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const res = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.workflow_run.head_sha,
              environment: "production",
              auto_merge: false,
              required_contexts: []
            });

            core.setOutput("deployment_id", res.data.id);

      # ---------------------------------------------
      # 2. Trigger Render Deploy
      # ---------------------------------------------
      - name: Trigger Render Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      # ---------------------------------------------
      # 3. Healthcheck (REQUIRED for status control)
      # ---------------------------------------------
      - name: Healthcheck
        id: health
        run: |
          for i in {1..10}; do
            echo "Attempt $i"
            if curl --fail https://api-football-gfpz.onrender.com/api/health; then
              echo "SUCCESS"
              exit 0
            fi
            sleep 15
          done
          exit 1

      # ---------------------------------------------
      # 4. Update GitHub Deployment Status
      # ---------------------------------------------
      - name: Update Deployment Status
        if: steps.health.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const state = "success";

            const deploymentId = Number("${{ steps.deployment.outputs.deployment_id }}");

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deploymentId,
              state: state,
              environment_url: "https://api-football-gfpz.onrender.com"
            });